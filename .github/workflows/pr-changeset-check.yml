name: PR check changeset check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-changeset-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #7.0.0
        with:
          fetch-depth: 0

      - name: Ensure changeset exists only when configurations are modified
        if: github.ref != 'changeset-release/main'
        shell: bash
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -q '^configurations/'; then
            echo "Changes made to configurations, checking changeset(s) exist.."

            if ! find .changeset -maxdepth 1 -type f -name "*-*-*.md" | grep -q .; then
              echo "PR changes files in configurations, so must include at least one changeset file."
              exit 1
            fi

            echo "Changeset file(s) found:"
            find .changeset -maxdepth 1 -type f -name "*-*-*.md"
          else
            echo "No changes made to configurations, checking changeset(s) don't exist.."

            if find .changeset -maxdepth 1 -type f -name "*-*-*.md" | grep -q .; then
              echo "PR does not change files in configurations, so must not include any changeset files."
              exit 1
            fi
          fi
