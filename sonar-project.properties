# To set up Sonar cloud follow https://github.com/DEFRA/cdp-documentation/blob/main/how-to/sonarcloud.md
# Update properties in this file as per the howto instructions
# Uncomment properties in this .github/workflows/check-pull-request.yml
# Uncomment properties in this .github/workflows/publish.yml
# Uncomment properties in this .github/workflows/publish-hotfix.yml

sonar.projectKey=DEFRA_grants-config-woodland
sonar.organization=defra

sonar.links.homepage=https://github.com/DEFRA/grants-config-woodland
sonar.links.ci=https://github.com/DEFRA/grants-config-woodland/actions
sonar.links.scm=https://github.com/DEFRA/grants-config-woodland
sonar.links.issue=https://github.com/DEFRA/grants-config-woodland/issues

sonar.sources=src/
sonar.exclusions=src/**/*.test.js,src/index.js,src/routes/health.js
sonar.tests=src/
sonar.test.inclusions=src/**/*.test.js

sonar.javascript.lcov.reportPaths=./coverage/lcov.info
